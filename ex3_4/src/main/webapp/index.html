<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>一元二次方程求解器</title>
</head>
<body>
<h1>请输入一元二次方程 ax² + bx + c = 0 的系数</h1>
<!--action是要传入的地方-->
<form action="solveEquation" method="post">
<!-- step="1"只能为整数-->
<!-- step="0.01"只能输入两位小数-->
<!-- step="any"任意数-->
<!-- require不能为空-->
  a:<input type="number" name="a" step="any" required><br><br>
  b:<input type="number" name="b" step="any" required><br><br>
  c:<input type="number" name="c" step="any" required><br><br>
  <input type="submit" value="计算实数根">
</form>
</body>
</html>
